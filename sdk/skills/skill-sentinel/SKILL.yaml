name: skill-sentinel
version: 1.0.0
license: MIT
authors:
  - OpenBag Foundation <tech@openbag.foundation>
display_name: Sentinel — Relato Anônimo
description: >
  Anonymous incident reporting skill. Encrypts the report client-side,
  routes through the Foundation mixnet, and never logs the reporter's
  identity. Used to flag suspicious bags, hostility against legitimate
  workers, or fraudulent verifications.
category: core-sensitive
maturity: beta
permissions:
  - read:status_current
  - write:agent_inbox
  - location:geohash7
  - notifications:local
  - storage:encrypted_local
  - http:sentinel.openbag.foundation/v0/reports
dependencies:
  agent: ">= 0.5.0"
hooks:
  on_install: scripts/on_install.js
  on_verify: scripts/on_verify.js
docs: https://github.com/openbagfoundation/clawhub-br/tree/main/registry/skill-sentinel
repository: https://github.com/openbagfoundation/openbag
audit_url: https://transparency.openbag.foundation/audits/skill-sentinel-v1
