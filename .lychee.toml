# Lychee link checker config
exclude = [
  "localhost",
  "127.0.0.1",
  "example.com",
  "^#",
  "openbag\\.foundation",
  "openbag\\.org",
  "clawhub-br\\.openbag",
  "stoplight",
  "idp\\.gov\\.br",
  "planalto\\.gov\\.br",
  "api\\.ifood\\.com\\.br",
