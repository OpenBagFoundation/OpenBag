<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="hex-mini" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D87432"/>
      <stop offset="100%" stop-color="#B8531F"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="#F5EFE2"/>

  <!-- Single bold hexagon -->
