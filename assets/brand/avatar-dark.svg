<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1F242C"/>
      <stop offset="100%" stop-color="#14181F"/>
    </linearGradient>
    <linearGradient id="hex-amber" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E0A82E"/>
      <stop offset="100%" stop-color="#D87432"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" fill="url(#bg-dark)"/>

  <!-- Outer hexagon -->
  <polygon points="256,64 416,156 416,356 256,448 96,356 96,156"
           fill="none" stroke="#E0A82E" stroke-width="3" opacity="0.6"/>

  <!-- Middle hexagon dashed -->
  <polygon points="256,108 376,178 376,334 256,404 136,334 136,178"
           fill="none" stroke="#E0A82E" stroke-width="2"
           stroke-dasharray="4 6" opacity="0.5"/>

  <!-- Main hexagon -->
  <polygon points="256,148 340,196 340,316 256,364 172,316 172,196"
           fill="url(#hex-amber)"/>

  <!-- Inner highlight -->
  <polygon points="256,148 340,196 256,232 172,196"
           fill="#FFFFFF" opacity="0.15"/>

  <!-- Bee silhouette - inverted colors for dark mode -->
  <g transform="translate(256, 256)">
    <ellipse cx="0" cy="0" rx="34" ry="46" fill="#14181F"/>

    <path d="M -28 -18 Q 0 -22 28 -18 L 28 -8 Q 0 -12 -28 -8 Z"
          fill="#E0A82E"/>
    <path d="M -32 6 Q 0 2 32 6 L 32 18 Q 0 14 -32 18 Z"
          fill="#E0A82E"/>

    <circle cx="0" cy="-38" r="14" fill="#14181F"/>

    <path d="M -5 -50 Q -10 -58 -8 -64" stroke="#14181F" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <path d="M 5 -50 Q 10 -58 8 -64" stroke="#14181F" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <circle cx="-8" cy="-64" r="2" fill="#14181F"/>
    <circle cx="8" cy="-64" r="2" fill="#14181F"/>

    <ellipse cx="-26" cy="-14" rx="22" ry="14" fill="#F5EFE2" opacity="0.9"
             transform="rotate(-25 -26 -14)"/>
    <ellipse cx="26" cy="-14" rx="22" ry="14" fill="#F5EFE2" opacity="0.9"
             transform="rotate(25 26 -14)"/>

    <path d="M -8 42 Q 0 52 8 42" fill="#14181F"/>
  </g>
</svg>
