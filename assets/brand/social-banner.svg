<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="sb-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5EFE2"/>
      <stop offset="100%" stop-color="#EAE2CF"/>
    </linearGradient>
    <linearGradient id="sb-hex" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D87432"/>
      <stop offset="100%" stop-color="#B8531F"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#sb-bg)"/>

  <!-- Decorative hexagons in background -->
  <g opacity="0.06">
    <polygon points="1100,80 1180,124 1180,212 1100,256 1020,212 1020,124"
             fill="none" stroke="#B8531F" stroke-width="2"/>
    <polygon points="80,520 160,564 160,652 80,696 0,652 0,564"
             fill="none" stroke="#B8531F" stroke-width="2"/>
    <polygon points="1080,500 1140,532 1140,594 1080,626 1020,594 1020,532"
             fill="#B8531F"/>
  </g>

  <!-- Top metadata bar -->
  <line x1="80" y1="80" x2="1120" y2="80"
        stroke="#14181F" stroke-width="1" opacity="0.2"/>

  <text x="80" y="68" font-family="'Geist Mono', monospace"
        font-size="14" letter-spacing="3" fill="#4A4F58">
    OPENBAG · RFC 001 + RFC 002 · MIT LICENSE
  </text>
  <text x="1120" y="68" text-anchor="end" font-family="'Geist Mono', monospace"
        font-size="14" letter-spacing="3" fill="#4A4F58">
    PUBLIC DRAFT · v1.1
  </text>

  <!-- Hexagon mark on left -->
  <g transform="translate(200, 320)">
    <polygon points="0,-150 130,-75 130,75 0,150 -130,75 -130,-75"
             fill="none" stroke="#B8531F" stroke-width="3" opacity="0.5"/>
    <polygon points="0,-115 100,-58 100,58 0,115 -100,58 -100,-58"
             fill="none" stroke="#B8531F" stroke-width="2"
             stroke-dasharray="4 6" opacity="0.4"/>
    <polygon points="0,-85 74,-43 74,43 0,85 -74,43 -74,-43"
             fill="url(#sb-hex)"/>
    <polygon points="0,-85 74,-43 0,-15 -74,-43"
             fill="#FFFFFF" opacity="0.12"/>

    <!-- Bee in center -->
    <g transform="scale(0.7)">
      <ellipse cx="0" cy="0" rx="34" ry="46" fill="#14181F"/>
      <path d="M -28 -18 Q 0 -22 28 -18 L 28 -8 Q 0 -12 -28 -8 Z" fill="#E0A82E"/>
      <path d="M -32 6 Q 0 2 32 6 L 32 18 Q 0 14 -32 18 Z" fill="#E0A82E"/>
      <circle cx="0" cy="-38" r="14" fill="#14181F"/>
      <path d="M -5 -50 Q -10 -58 -8 -64" stroke="#14181F" stroke-width="2.2" fill="none" stroke-linecap="round"/>
      <path d="M 5 -50 Q 10 -58 8 -64" stroke="#14181F" stroke-width="2.2" fill="none" stroke-linecap="round"/>
      <circle cx="-8" cy="-64" r="2" fill="#14181F"/>
      <circle cx="8" cy="-64" r="2" fill="#14181F"/>
      <ellipse cx="-26" cy="-14" rx="22" ry="14" fill="#F5EFE2" opacity="0.85"
               transform="rotate(-25 -26 -14)"/>
      <ellipse cx="26" cy="-14" rx="22" ry="14" fill="#F5EFE2" opacity="0.85"
               transform="rotate(25 26 -14)"/>
      <path d="M -8 42 Q 0 52 8 42" fill="#14181F"/>
    </g>
  </g>

  <!-- Headline right side -->
  <text x="400" y="240" font-family="'Fraunces', Georgia, serif"
        font-size="84" font-weight="300" fill="#14181F" letter-spacing="-2">
    Bag legítima
  </text>
  <text x="400" y="320" font-family="'Fraunces', Georgia, serif"
        font-size="84" font-weight="300" fill="#14181F" letter-spacing="-2">
    emite <tspan font-style="italic" fill="#B8531F">sinal.</tspan>
  </text>
  <text x="400" y="400" font-family="'Fraunces', Georgia, serif"
        font-size="64" font-weight="300" fill="#4A4F58" letter-spacing="-1.5">
    A fraudada é <tspan font-style="italic" fill="#14181F">silenciosa.</tspan>
  </text>

  <!-- Bottom tagline -->
  <line x1="400" y1="450" x2="1120" y2="450"
        stroke="#14181F" stroke-width="1" opacity="0.2"/>

  <text x="400" y="490" font-family="'Geist Mono', monospace"
        font-size="16" letter-spacing="3" fill="#B8531F">
    OPEN · AGENT · REWARD · SENTINEL · UNIVERSAL
  </text>

  <text x="400" y="540" font-family="'Geist', sans-serif"
        font-size="22" fill="#14181F" font-weight="400">
    Identidade aberta, agente pessoal e reputação cívica
  </text>
  <text x="400" y="568" font-family="'Geist', sans-serif"
        font-size="22" fill="#14181F" font-weight="400">
    para a última milha. <tspan fill="#4A4F58" font-style="italic">MIT-licensed.</tspan>
  </text>

  <!-- Bottom bar -->
  <line x1="80" y1="600" x2="1120" y2="600"
        stroke="#14181F" stroke-width="1" opacity="0.2"/>
  <text x="80" y="588" font-family="'Geist Mono', monospace"
        font-size="13" letter-spacing="2.5" fill="#4A4F58">
    🐝 GITHUB.COM/OPENBAG · OPENBAG.ORG
  </text>
  <text x="1120" y="588" text-anchor="end" font-family="'Geist Mono', monospace"
        font-size="13" letter-spacing="2.5" fill="#4A4F58">
    A COLMEIA RECEBE QUEM TRAZ MEL
  </text>
</svg>
