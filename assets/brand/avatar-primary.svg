<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5EFE2"/>
      <stop offset="100%" stop-color="#EAE2CF"/>
    </linearGradient>
    <linearGradient id="hex-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D87432"/>
      <stop offset="100%" stop-color="#B8531F"/>
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="3"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background paper -->
  <rect width="512" height="512" fill="url(#bg-gradient)"/>

  <!-- Subtle grain pattern -->
  <g opacity="0.04">
    <circle cx="80" cy="80" r="1" fill="#14181F"/>
    <circle cx="180" cy="120" r="1" fill="#14181F"/>
    <circle cx="320" cy="60" r="1" fill="#14181F"/>
    <circle cx="430" cy="140" r="1" fill="#14181F"/>
    <circle cx="60" cy="280" r="1" fill="#14181F"/>
    <circle cx="450" cy="380" r="1" fill="#14181F"/>
    <circle cx="120" cy="430" r="1" fill="#14181F"/>
    <circle cx="380" cy="450" r="1" fill="#14181F"/>
  </g>

  <!-- Outer hexagon - thin outline -->
  <polygon points="256,64 416,156 416,356 256,448 96,356 96,156"
           fill="none" stroke="#B8531F" stroke-width="3" opacity="0.5"/>

  <!-- Middle hexagon - dashed -->
  <polygon points="256,108 376,178 376,334 256,404 136,334 136,178"
           fill="none" stroke="#B8531F" stroke-width="2"
           stroke-dasharray="4 6" opacity="0.4"/>

  <!-- Main solid hexagon with gradient -->
  <polygon points="256,148 340,196 340,316 256,364 172,316 172,196"
           fill="url(#hex-gradient)" filter="url(#soft-shadow)"/>

  <!-- Inner highlight on hexagon -->
  <polygon points="256,148 340,196 256,232 172,196"
           fill="#FFFFFF" opacity="0.12"/>

  <!-- Bee silhouette in center -->
  <g transform="translate(256, 256)">
    <!-- Body (oval) -->
    <ellipse cx="0" cy="0" rx="34" ry="46" fill="#14181F"/>

    <!-- Stripes -->
    <path d="M -28 -18 Q 0 -22 28 -18 L 28 -8 Q 0 -12 -28 -8 Z"
          fill="#E0A82E"/>
    <path d="M -32 6 Q 0 2 32 6 L 32 18 Q 0 14 -32 18 Z"
          fill="#E0A82E"/>

    <!-- Head -->
    <circle cx="0" cy="-38" r="14" fill="#14181F"/>

    <!-- Antennae -->
    <path d="M -5 -50 Q -10 -58 -8 -64" stroke="#14181F" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <path d="M 5 -50 Q 10 -58 8 -64" stroke="#14181F" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <circle cx="-8" cy="-64" r="2" fill="#14181F"/>
    <circle cx="8" cy="-64" r="2" fill="#14181F"/>

    <!-- Wings -->
    <ellipse cx="-26" cy="-14" rx="22" ry="14" fill="#F5EFE2" opacity="0.85"
             transform="rotate(-25 -26 -14)"/>
    <ellipse cx="26" cy="-14" rx="22" ry="14" fill="#F5EFE2" opacity="0.85"
             transform="rotate(25 26 -14)"/>

    <!-- Wing veins (subtle) -->
    <ellipse cx="-26" cy="-14" rx="22" ry="14" fill="none" stroke="#14181F" stroke-width="0.8" opacity="0.3"
             transform="rotate(-25 -26 -14)"/>
    <ellipse cx="26" cy="-14" rx="22" ry="14" fill="none" stroke="#14181F" stroke-width="0.8" opacity="0.3"
             transform="rotate(25 26 -14)"/>

    <!-- Bottom point -->
    <path d="M -8 42 Q 0 52 8 42" fill="#14181F"/>
  </g>
</svg>
